<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Catalog | DBpedia KG Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="catalog">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html" aria-label="KG Catalog Home">
        <img class="brand-dbpedia-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/cf/DBpedia_logo.svg" alt="DBpedia">
        <span class="brand-title">KG Catalog</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html" data-page="home">Overview</a>
        <a href="catalog.html" data-page="catalog">Browse</a>
        <a href="submit.html" data-page="submit">Add a KG</a>
        <a href="download.html" data-page="download">Download</a>
        <a href="about.html" data-page="about">About</a>
      </nav>
      <a class="nav-cta" href="https://databus.dbpedia.org/knowledge-graph-catalog" target="_blank" rel="noopener">Databus source</a>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card panel catalog-panel">
        <div class="panel-head">
          <h1 style="font-size:1.42rem;">Browse knowledge graphs</h1>
          <strong id="result-count" class="value">0 graphs</strong>
        </div>
        <p class="lead" style="margin-top:0;">Filter by domain and sort by name, size or freshness.</p>
        <div class="controls">
          <select id="domain" class="select">
            <option value="">All domains</option>
            <option value="Cross-domain">Cross-domain</option>
            <option value="Geography & Environment">Geography & Environment</option>
            <option value="Government & Public Sector">Government & Public Sector</option>
            <option value="Life Sciences & Health">Life Sciences & Health</option>
            <option value="Economy, Industry & Infrastructure">Economy, Industry & Infrastructure</option>
            <option value="Publications, Education & Research">Publications, Education & Research</option>
            <option value="Media, Culture & Entertainment">Media, Culture & Entertainment</option>
            <option value="Linguistics, Social & Digital Knowledge Systems">Linguistics, Social & Digital Knowledge Systems</option>
          </select>
          <select id="sort" class="select">
            <option value="name">Sort: Name</option>
            <option value="size">Sort: Dump size</option>
            <option value="recent">Sort: Recently updated</option>
          </select>
        </div>
      </section>

      <section id="catalog-list" class="catalog-grid"></section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>Built for DBpedia knowledge graph discovery and reuse.</span>
      <span><a href="about.html">About</a> · <a href="submit.html">Submit a graph</a> · <a href="download.html">Download</a></span>
    </div>
  </footer>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/catalog.js"></script>
</body>
</html>
